<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134e4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#134e4add;stop-opacity:1" />
    </linearGradient>
    <pattern id="pattern-nasai" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#2dd4bf22"/>
      <circle cx="0" cy="0" r="1" fill="#2dd4bf15"/>
      <circle cx="40" cy="0" r="1" fill="#2dd4bf15"/>
      <circle cx="0" cy="40" r="1" fill="#2dd4bf15"/>
      <circle cx="40" cy="40" r="1" fill="#2dd4bf15"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="280" fill="url(#bg)"/>
  <rect width="400" height="280" fill="url(#pattern-nasai)"/>
  
  <!-- Decorative border -->
  <rect x="12" y="12" width="376" height="256" rx="12" fill="none" stroke="#2dd4bf44" stroke-width="1.5"/>
  
  <!-- Corner ornaments -->
  <circle cx="30" cy="30" r="8" fill="#2dd4bf22"/>
  <circle cx="370" cy="30" r="8" fill="#2dd4bf22"/>
  <circle cx="30" cy="250" r="8" fill="#2dd4bf22"/>
  <circle cx="370" cy="250" r="8" fill="#2dd4bf22"/>
  
  <!-- Book icon -->
  <g transform="translate(175, 60)" fill="#2dd4bf">
    <path d="M25 5 C25 5 20 0 10 0 C0 0 -5 5 -5 5 L-5 45 C-5 45 0 40 10 40 C20 40 25 45 25 45 Z" fill="#2dd4bf33" stroke="#2dd4bf" stroke-width="1.5"/>
    <path d="M25 5 C25 5 30 0 40 0 C50 0 55 5 55 5 L55 45 C55 45 50 40 40 40 C30 40 25 45 25 45 Z" fill="#2dd4bf22" stroke="#2dd4bf" stroke-width="1.5"/>
    <line x1="25" y1="5" x2="25" y2="45" stroke="#2dd4bf" stroke-width="1"/>
  </g>
  
  <!-- Book name - Thuluth calligraphy style -->
  <text x="200" y="150" text-anchor="middle" fill="#2dd4bf" font-family="'Thuluth', 'AMiri', 'Traditional Arabic', serif" font-size="32" font-weight="bold" letter-spacing="1">سنن النسائي</text>
  
  <!-- Decorative underline -->
  <path d="M140 172 Q200 180 260 172" fill="none" stroke="#2dd4bf44" stroke-width="1.5"/>
  
  <!-- Hadith count badge -->
  <rect x="155" y="188" width="90" height="28" rx="14" fill="#2dd4bf22" stroke="#2dd4bf44" stroke-width="1"/>
  <text x="200" y="207" text-anchor="middle" fill="#2dd4bf" font-family="'Tajawal', sans-serif" font-size="12" font-weight="500">كتاب حديث</text>
  
  <!-- Bottom decorative dots -->
  <circle cx="180" cy="240" r="2" fill="#2dd4bf44"/>
  <circle cx="200" cy="240" r="3" fill="#2dd4bf66"/>
  <circle cx="220" cy="240" r="2" fill="#2dd4bf44"/>
</svg>