      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);

      --dropdown-bg: rgba(255, 255, 255, 0.95);

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;

    body {
      margin: 0;
      font-family: 'Tajawal', sans-serif;
      background-color: var(--bg-surface);
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      padding: 60px 20px 100px;
      min-height: 100dvh;
      transition: color 0.3s ease, background-image 0.3s ease;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: var(--overlay);
      z-index: -1;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
      padding: 14px 16px;
      z-index: 10;
    }

    .header-title {
      font-weight: bold;
      font-size: 18px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      padding: 5px;
      display: flex;
      transition: 0.2s;
    }
    .icon-btn:active {
      transform: scale(0.9);
    }

    /* Card Layout */
    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--glass-shadow);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .picker-card {
      margin-top: 2vh;
      z-index: 100;
    }

    label {
      font-size: 14px;
      color: var(--accent-main);
      font-weight: bold;
    }

    /* Dropdown UI with Search */
    .custom-select-wrapper {
      position: relative;
    }

    .custom-select-trigger {
      padding: 16px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--bg-surface);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .custom-options {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--dropdown-bg);
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      z-index: 9999;
      max-height: 350px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .custom-options.open {
      display: flex;
    }

    .search-container {
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--glass-border);
    }

    .search-input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: 'Tajawal', sans-serif;
      outline: none;
      font-size: 14px;
    }

    .options-scroll {
      overflow-y: auto;
      flex: 1;
      padding: 8px;
    }

    .custom-option {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: 10px;
      font-size: 14px;
      transition: 0.2s;
    }

    .custom-option:hover,
    .custom-option.selected {
      background: var(--accent-muted);
      color: var(--accent-main);
    }

    /* Player Area */
    .now {
      text-align: center;
      padding: 40px 20px;
      margin-top: auto;
      z-index: 10;
    }

    .nowStation {
      font-family: 'Amiri', serif;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--text-secondary);
      border-radius: 50%;
    }

    .live-indicator.playing .pulse-dot {
      background: var(--live-color);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .play-pause-btn {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: var(--accent-main);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .action-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--accent-muted);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .action-btn.active {
      color: var(--accent-main);
      border-color: var(--accent-main);
    }

    /* Loader inside play button */
    .loader {
      display: none;
      position: absolute;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .play-pause-btn.loading .play-icon,
    .play-pause-btn.loading .pause-icon {
      display: none !important;
    }

    .play-pause-btn.loading .loader {
      display: block;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: var(--dropdown-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      padding: 20px;
      max-height: 70vh;
      overflow-y: auto;
    }

    .toast {
      position: fixed;
      top: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--accent-main);
      color: white;
      padding: 10px 25px;
      border-radius: 50px;
      transition: 0.4s;
      z-index: 20000;
      font-weight: bold;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* =======================================================
       <img src="img/SVG/star.svg" class="setting-icon" style="width:1em;height:1em;vertical-align:-0.125em;"> UI/UX UPLIFT â€” "On-Air" live radio
       Drives the live visuals off the existing

       ======================================================= */
    @keyframes rUp { from{opacity:0; transform:translateY(18px);} to{opacity:1; transform:translateY(0);} }
    .header      { animation:rUp .5s cubic-bezier(.22,1,.36,1) both; }
    .picker-card { animation:rUp .55s .07s cubic-bezier(.22,1,.36,1) both; }
    .card.now    { animation:rUp .6s .15s cubic-bezier(.22,1,.36,1) both; }

    /* Hero "now playing" card */
    .card.now {
      position:relative; overflow:hidden; padding:46px 22px 40px;
      background:

    .nowStation { font-size:27px; line-height:1.35; letter-spacing:.3px; }

    .live-indicator {

      padding:6px 15px; border-radius:999px; width:fit-content; margin:6px auto 18px;

    .live-indicator.playing {

      color:var(--live-color);
    }
    .pulse-dot { width:9px; height:9px; }

    /* Equalizer â€” animates only when on air */
    .eq { display:flex; align-items:flex-end; justify-content:center; gap:4px; height:26px; margin:-6px 0 18px; opacity:0; transition:opacity .3s; }
    .eq span { width:4px; height:6px; border-radius:2px; background:var(--accent-main); }
    .card.now:has(.live-indicator.playing) .eq { opacity:.9; }
    .card.now:has(.live-indicator.playing) .eq span { animation:eqJump .9s ease-in-out infinite; }
    .eq span:nth-child(1){ animation-delay:0s; }   .eq span:nth-child(2){ animation-delay:.18s; }
    .eq span:nth-child(3){ animation-delay:.34s; }  .eq span:nth-child(4){ animation-delay:.46s; }
    .eq span:nth-child(5){ animation-delay:.22s; }
    @keyframes eqJump { 0%,100%{height:6px;} 50%{height:24px;} }

    /* Play button â€” bigger, gradient, glowing; emits radio-wave rings when live */
    .controls { gap:26px; }
    .play-pause-btn {
      width:86px; height:86px;
      background:linear-gradient(145deg, color-mix(in srgb, var(--accent-main) 86%, #fff), var(--accent-main));
      box-shadow:0 12px 32px -6px color-mix(in srgb, var(--accent-main) 70%, transparent), inset 0 2px 0 rgba(255,255,255,.28);
      transition:transform .15s ease, box-shadow .3s ease;
    }
    .play-pause-btn:active { transform:scale(.93); }
    .play-pause-btn::before, .play-pause-btn::after {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:2px solid var(--accent-main); opacity:0; pointer-events:none;
    }
    .card.now:has(.live-indicator.playing) .play-pause-btn::before { animation:wave 2.2s ease-out infinite; }
    .card.now:has(.live-indicator.playing) .play-pause-btn::after  { animation:wave 2.2s ease-out infinite 1.1s; }
    @keyframes wave { 0%{opacity:.5; transform:scale(1);} 100%{opacity:0; transform:scale(2.05);} }

    /* Favourite button */
    .action-btn { width:54px; height:54px; transition:.2s; }
    .action-btn:active { transform:scale(.9); }
    .action-btn.active {
      color:var(--live-color); border-color:var(--live-color);
      background:color-mix(in srgb, var(--live-color) 12%, transparent);
    }
    .action-btn.active svg { filter:drop-shadow(0 0 6px color-mix(in srgb, var(--live-color) 50%, transparent)); }

    .custom-select-trigger { transition:transform .15s ease, border-color .2s ease; }
    .custom-select-trigger:active { transform:scale(.99); }

    @media (prefers-reduced-motion: reduce) {
      .header,.picker-card,.card.now,.eq span,
      .play-pause-btn::before,.play-pause-btn::after { animation:none !important; }
    }

        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
      </button>
    </div>

    <div class="card picker-card">
      <label data-i18n="radio_choose">Ø§Ø®ØªØ± Ø§Ù„Ø¥Ø°Ø§Ø¹Ø©</label>
      <div class="custom-select-wrapper" id="radioDropdown">
        <div class="custom-select-trigger" id="dropdownTrigger">
          <span id="selectedText" data-i18n="radio_loading">Ø¬Ø§Ø±ÙŠ ØªØ­Ù…ÙŠÙ„ Ø§Ù„Ø¥Ø°Ø§Ø¹Ø§Øª...</span>
          <span>â–¼</span>
        </div>
        <div class="custom-options" id="dropdownOptions">
          <div class="search-container">
            <input type="text" class="search-input" id="radioSearch" placeholder="Ø§Ø¨Ø­Ø« Ø¹Ù† Ù‚Ø§Ø±Ø¦ Ø£Ùˆ Ø¥Ø°Ø§Ø¹Ø©..." data-i18n-placeholder="radio_search_placeholder">
          </div>
          <div class="options-scroll" id="optionsList"></div>
        </div>
      </div>
    </div>

    <div class="card now">
      <div class="nowStation" id="nowStation" data-i18n="radio_default">Ø§Ø®ØªØ± Ø¥Ø°Ø§Ø¹Ø© Ù„Ù„Ø¨Ø¯Ø¡</div>
      <div class="live-indicator" id="liveIndicator">
        <div class="pulse-dot"></div>
        <span id="liveText" data-i18n="radio_stopped">Ù…ØªÙˆÙ‚Ù</span>
      </div>

      <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>

      <div class="controls">
        <button class="action-btn" id="favBtn" title="Ø¥Ø¶Ø§ÙØ© Ù„Ù„Ù…ÙØ¶Ù„Ø©" data-i18n-title="radio_add_fav">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>

        <button class="play-pause-btn" id="playBtn">
          <div class="loader" id="loader"></div>
          <svg id="playIcon" class="play-icon" viewBox="0 0 24 24" width="35" height="35" fill="white">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg id="pauseIcon" class="pause-icon" viewBox="0 0 24 24" width="35" height="35" fill="white" style="display:none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>
      </div>
    </div>

    <audio id="audio" preload="none" playsinline></audio>
  </div>

  <div class="modal-overlay" id="favModal" onclick="if(event.target === this) closeFavModal()">
    <div class="modal-content">
      <h3 style="margin-top:0; text-align:center; color:var(--accent-main);" data-i18n="radio_fav_title">Ø§Ù„Ù…ÙØ¶Ù„Ø©</h3>
      <div id="favList"></div>
      <button onclick="closeFavModal()" style="margin-top:20px; width:100%; padding:12px; border-radius:12px; border:none; background:var(--accent-main); color:white; font-weight:bold; cursor:pointer;" data-i18n="close">Ø¥ØºÙ„Ø§Ù‚</button>
    </div>
  </div>

  <script>
    let allStations = [];

    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const selectedText = document.getElementById('selectedText');
    const optionsList = document.getElementById('optionsList');
    const searchInput = document.getElementById('radioSearch');
    const nowStation = document.getElementById('nowStation');
    const liveIndicator = document.getElementById('liveIndicator');
    const liveText = document.getElementById('liveText');
    const favBtn = document.getElementById('favBtn');

    let hls = null;
    let currentStation = null;
    let userWantsPlay = false;

    // --- Media Session ---
    // Build correct base URL regardless of subdirectory deployment (e.g. GitHub Pages /Tasbee7/)
    const _mediaBase = window.location.origin + window.location.pathname.replace(/\/[^/]+\/[^/]*$/, '');

    function updateMediaSession(stationName) {
      if (!('mediaSession' in navigator)) return;
      navigator.mediaSession.metadata = new MediaMetadata({
        title: stationName || t('radio_title'),
        artist: t('radio_live_artist'),
        album: t('radio_media_artist'),
        artwork: [
          { src: `${_mediaBase}/icons/icon-192.png`, sizes: '192x192', type: 'image/png' },
          { src: `${_mediaBase}/icons/icon_512.png`, sizes: '512x512', type: 'image/png' },
          { src: `${_mediaBase}/icons/icon_1024.png`, sizes: '1024x1024', type: 'image/png' }
        ]
      });
      navigator.mediaSession.setActionHandler('play', () => togglePlay(true));
      navigator.mediaSession.setActionHandler('pause', () => togglePlay(false));
      navigator.mediaSession.setActionHandler('stop', () => { audio.pause(); updateUI(false); });
      navigator.mediaSession.setActionHandler('seekbackward', null);
      navigator.mediaSession.setActionHandler('seekforward', null);
      navigator.mediaSession.setActionHandler('previoustrack', null);
      navigator.mediaSession.setActionHandler('nexttrack', null);
    }

    const isMobile = /iPad|iPhone|iPod|Android/i.test(navigator.userAgent);

    function supportsNativeHLS() {
      const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
      return isSafari && audio.canPlayType('application/vnd.apple.mpegurl');
    }

    function loadStream(url, stationName) {
      audio.pause();
      if (hls) { hls.destroy(); hls = null; }

      if (url.includes('.m3u8')) {
        if (supportsNativeHLS()) {
          audio.src = url;
        } else if (Hls.isSupported()) {
          hls = new Hls({ enableWorker: true, lowLatencyMode: true });
          hls.loadSource(url);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {});
          hls.on(Hls.Events.ERROR, (_, data) => {
            if (data.fatal) {
              hls.destroy();
              hls = null;
              showToast(t('radio_stream_error'));
              updateUI(false);
            }
          });
        } else {
          showToast(t('radio_hls_not_supported'));
        }
      } else {
        audio.src = url;
      }

      nowStation.innerText = stationName;
      updateMediaSession(stationName);
      checkFavStatus(url);
      audio.dataset.loadedUrl = url;
    }

    // --- Play/Pause with loading state and error handling ---
    function togglePlay(forcePlay = null) {
      if (!currentStation) {
        showToast(t('radio_select_first'));
        return;
      }

      const shouldPlay = forcePlay !== null ? forcePlay : audio.paused;

      if (shouldPlay) {
        userWantsPlay = true;
        // Lazy-connect to the stream the first time the user plays this station.
        if (currentStation && audio.dataset.loadedUrl !== currentStation.url) {
          loadStream(currentStation.url, currentStation.name);
        }
        playBtn.classList.add('loading');
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            playBtn.classList.remove('loading');
            updateUI(true);
            updateMediaSession(currentStation.name);
          }).catch((err) => {
            console.error('Play failed:', err);
            playBtn.classList.remove('loading');
            showToast(t('radio_play_error'));
            userWantsPlay = false;
            updateUI(false);
          });
        } else {
          updateUI(true);
        }
      } else {
        userWantsPlay = false;
        audio.pause();
        updateUI(false);
      }
    }

    function updateUI(isPlaying) {
      if (isPlaying) {
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
        liveIndicator.classList.add('playing');
        liveText.textContent = t('radio_live');
      } else {
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
        liveIndicator.classList.remove('playing');
        liveText.textContent = t('radio_stopped');
        playBtn.classList.remove('loading');
      }
      if ('mediaSession' in navigator) {
        navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
      }
    }

    // --- Event listeners for audio to update UI ---
    audio.addEventListener('playing', () => {
      playBtn.classList.remove('loading');
      updateUI(true);
      document.dispatchEvent(new CustomEvent('_audioPlaying'));
    });
    audio.addEventListener('pause', () => {
      playBtn.classList.remove('loading');
      updateUI(false);
    });
    audio.addEventListener('waiting', () => {
      playBtn.classList.add('loading');
    });
    audio.addEventListener('error', (e) => {
      playBtn.classList.remove('loading');
      updateUI(false);
      // Only surface an error if the user actually tried to play â€” ignore idle/
      // preload errors so opening the page never shows "failed to connect".
      if (!userWantsPlay) return;
      console.error('Audio error:', e);
      showToast(t('radio_playback_error'));
    });

    // --- Background playback guard (Android Chrome pauses audio when page hides) ---
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && userWantsPlay && audio.paused) {
        audio.play().catch(() => {});
      }
    });
    // If audio is paused unexpectedly while page is hidden (system interruption), try once to resume
    audio.addEventListener('pause', () => {
      if (userWantsPlay && document.visibilityState === 'hidden') {
        setTimeout(() => { if (audio.paused) audio.play().catch(() => {}); }, 500);
      }
    });

    // --- Favorites management ---
    function checkFavStatus(url) {
      const favs = JSON.parse(localStorage.getItem('favRadios') || '[]');
      favBtn.classList.toggle('active', favs.some(f => f.url === url));
    }

    function toggleFavorite() {
      if (!currentStation) return;
      let favs = JSON.parse(localStorage.getItem('favRadios') || '[]');
      const index = favs.findIndex(f => f.url === currentStation.url);
      if (index === -1) {
        favs.push(currentStation);
        showToast(t('radio_fav_added'));
      } else {
        favs.splice(index, 1);
        showToast(t('radio_fav_removed'));
      }
      localStorage.setItem('favRadios', JSON.stringify(favs));
      checkFavStatus(currentStation.url);
    }

    function openFavModal() {
      const list = document.getElementById('favList');
      const favs = JSON.parse(localStorage.getItem('favRadios') || '[]');
      if (favs.length === 0) {
        list.innerHTML = '<div style="text-align:center; padding:20px; opacity:0.7;">' + t('radio_fav_empty') + '</div>';
      } else {
        list.innerHTML = '';
        favs.forEach(fav => {
          const div = document.createElement('div');
          div.style = "padding:15px 0; border-bottom:1px solid var(--glass-border); cursor:pointer; display:flex; justify-content:space-between; align-items:center;";
          div.innerHTML = `
            <span style="font-weight:bold;">${fav.name}</span>
            <button onclick="removeFromFav('${fav.url}', event)" style="background:none; border:none; color:var(--live-color); cursor:pointer; font-weight:bold; padding:5px;">${t('radio_fav_delete')}</button>
          `;
          div.onclick = () => {
            selectStation(fav);
            closeFavModal();
          };
          list.appendChild(div);
        });
      }
      document.getElementById('favModal').classList.add('active');
    }

    function removeFromFav(url, event) {
      event.stopPropagation(); // Ù…Ù†Ø¹ Ø§Ù„Ù†Ù‚Ø± Ù…Ù† Ø§Ø®ØªÙŠØ§Ø± Ø§Ù„Ù…Ø­Ø·Ø©
      let favs = JSON.parse(localStorage.getItem('favRadios') || '[]');
      favs = favs.filter(f => f.url !== url);
      localStorage.setItem('favRadios', JSON.stringify(favs));
      if (currentStation && currentStation.url === url) checkFavStatus(url);
      openFavModal(); // ØªØ­Ø¯ÙŠØ« Ø§Ù„Ù‚Ø§Ø¦Ù…Ø©
      showToast(t('radio_fav_deleted'));
    }

    function closeFavModal() {
      document.getElementById('favModal').classList.remove('active');
    }

    // --- Station selection ---
    function selectStation(station) {
      currentStation = station;
      // Drop the i18n placeholders so a later applyTranslations() (e.g. on
      // language switch) won't overwrite the chosen station name.
      selectedText.removeAttribute('data-i18n');
      nowStation.removeAttribute('data-i18n');
      const dispName = I18n.name('stations', station.name, station.name);
      selectedText.textContent = dispName;
      nowStation.textContent = dispName;
      localStorage.setItem('lastStation', JSON.stringify(station));
      // Lazy-connect: don't touch the audio stream until the user presses play.
      // Auto-loading on open caused a spurious "failed to connect" for streams
      // without CORS/preload support.
      const wasPlaying = userWantsPlay;
      audio.pause();
      if (hls) { hls.destroy(); hls = null; }
      audio.dataset.loadedUrl = '';
      // NB: don't register mediaSession here (it would expose a 'play' handler
      // that can auto-fire). It's set in loadStream() when the user plays.
      checkFavStatus(station.url);
      playBtn.classList.remove('loading');
      if (wasPlaying) { togglePlay(true); }   // switching while playing â†’ keep playing
      else { updateUI(false); }               // idle â†’ just show stopped
      // Close dropdown
      document.getElementById('dropdownOptions').classList.remove('open');
    }

    // --- Build dropdown with search ---
    function renderList(list) {
      optionsList.innerHTML = '';
      if (list.length === 0) {
        optionsList.innerHTML = '<div class="custom-option" style="text-align:center;">' + t('radio_no_results') + '</div>';
        return;
      }
      list.forEach(station => {
        const div = document.createElement('div');
        div.className = 'custom-option';
        div.textContent = I18n.name('stations', station.name, station.name);
        div.onclick = () => selectStation(station);
        optionsList.appendChild(div);
      });
    }

    // --- Load stations from global variable ---
    function init() {
      allStations = typeof RADIO_STATIONS !== 'undefined' ? RADIO_STATIONS : [];
      window.__stations = allStations;
      renderList(allStations);
      setupLastPlayed();
    }

    function setupLastPlayed() {
      const last = JSON.parse(localStorage.getItem('lastStation'));
      if (last && last.name && last.url) {
        selectStation(last);
      } else if (allStations.length) {
        selectStation(allStations[0]);
      }
    }

    // --- Search filter (matches Arabic name + localized name) ---
    searchInput.oninput = (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = allStations.filter(s =>
        s.name.toLowerCase().includes(term) ||
        I18n.name('stations', s.name, s.name).toLowerCase().includes(term)
      );
      renderList(filtered);
    };

    // Re-render station names when the UI language changes.
    window.addEventListener('langchange', () => {
      renderList(allStations);
      if (currentStation) {
        const dn = I18n.name('stations', currentStation.name, currentStation.name);
        selectedText.textContent = dn;
        nowStation.textContent = dn;
      }
    });

    // --- Dropdown toggle with click outside ---
    document.getElementById('dropdownTrigger').onclick = (e) => {
      e.stopPropagation();
      const dropdown = document.getElementById('dropdownOptions');
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        searchInput.focus();
        searchInput.value = ''; // Ù…Ø³Ø­ Ø§Ù„Ø¨Ø­Ø« Ø¹Ù†Ø¯ ÙØªØ­ Ø§Ù„Ù‚Ø§Ø¦Ù…Ø©
        renderList(allStations); 
      }
    };

    document.addEventListener('click', (e) => {
      if (!document.getElementById('radioDropdown').contains(e.target)) {
        document.getElementById('dropdownOptions').classList.remove('open');
      }
    });

    // --- Theme toggle ---
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon(next);
    }
    
    function updateThemeIcon(theme) {
      const sunIcon = document.getElementById('themeIconSun');
      const moonIcon = document.getElementById('themeIconMoon');
      
      if(theme === 'light') {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    }

    // --- Helpers ---
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // --- Event listeners for UI buttons ---
    playBtn.onclick = () => togglePlay();
    favBtn.onclick = () => toggleFavorite();

    // --- Load theme and start ---
    window.onload = () => {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      updateThemeIcon(savedTheme);
      init();
    };
  </script>

    if (window.I18n) I18n.init();
